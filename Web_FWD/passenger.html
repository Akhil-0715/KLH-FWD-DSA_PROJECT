<!DOCTYPE html>
<html>
<head>
<title>Passenger Details</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to right,#1d3557,#457b9d);
text-align:center;
color:white;
}

.container{
background:white;
width:450px;
margin:80px auto;
padding:40px;
border-radius:20px;
color:black;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
background:#1d3557;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e63946;
}
</style>
</head>

<body>

<h1>Passenger Details</h1>

<div class="container">
<label for="name">Name:</label><br>
<input type="text" id="name" placeholder="Passenger Name" required>
<label for="age">Age:</label><br>
<input type="number" id="age" placeholder="Age" required>
<label for="phone">Mobile Number:</label><br>
<input 
type="tel" 
id="phone" 
placeholder="Mobile Number" 
pattern="[0-9]{10}" 
maxlength="10"
required
>

<br>

<button onclick="goPayment()">Continue to Payment</button>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let bus = params.get("bus");
let seats = params.get("seats");
let total = params.get("total");

function goPayment(){

let phone = document.getElementById("phone").value;

if(phone.length !== 10){
alert("Phone number must be exactly 10 digits");
return;
}

window.location.href =
"payment.html?bus=" + encodeURIComponent(bus) +
"&seats=" + encodeURIComponent(seats) +
"&total=" + total;

}

</script>

</body>
</html>
