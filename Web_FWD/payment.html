<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right,#1d3557,#457b9d);
    text-align:center;
    color:white;
}

h1{
    margin-top:40px;
}

.container{
    background:white;
    width:450px;
    margin:60px auto;
    padding:35px;
    border-radius:18px;
    color:black;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.total{
    font-size:20px;
    margin-bottom:20px;
    font-weight:bold;
}

.payment-options{
    text-align:left;
    margin:20px 0;
}

.payment-options label{
    display:block;
    margin:12px 0;
    font-size:15px;
}

button{
    margin-top:20px;
    padding:12px 35px;
    border:none;
    border-radius:25px;
    background:#1d3557;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63946;
}

</style>
</head>

<body>

<h1>Secure Payment</h1>

<div class="container">

<div class="total">
Total Amount: ₹<span id="total"></span>
</div>

<div class="payment-options">

<label>
<input type="radio" name="payment" checked>
Credit / Debit Card
</label>

<label>
<input type="radio" name="payment">
UPI Payment
</label>

<label>
<input type="radio" name="payment">
Net Banking
</label>

<label>
<input type="radio" name="payment">
Wallet
</label>

</div>

<button onclick="payNow()">Pay Now</button>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let bus = params.get("bus");
let seats = params.get("seats");
let total = params.get("total");

document.getElementById("total").innerText = total;

function payNow(){

let ticketId = "TKT" + Math.floor(Math.random()*1000000);

window.location.href =
"ticket.html?bus=" + encodeURIComponent(bus) +
"&seats=" + encodeURIComponent(seats) +
"&total=" + total +
"&ticket=" + ticketId;

}

</script>

</body>
</html>
