<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(to right,#1d3557,#457b9d);
    text-align:center;
    color:white;
}

.container{
    background:white;
    width:400px;
    margin:100px auto;
    padding:40px;
    border-radius:15px;
    color:black;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    background:#1d3557;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63946;
}

</style>
</head>

<body>

<h1>Payment Page</h1>

<div class="container">

<h2>Total Amount: ₹<span id="total"></span></h2>

<p>Click to complete your payment.</p>

<button onclick="payNow()">Pay Now</button>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let bus = params.get("bus");
let seats = params.get("seats");
let total = params.get("total");

document.getElementById("total").innerText = total;

function payNow(){

    let ticketId = "TKT" + Math.floor(Math.random()*1000000);

    window.location.href =
        "ticket.html?bus=" + encodeURIComponent(bus) +
        "&seats=" + encodeURIComponent(seats) +
        "&total=" + total +
        "&ticket=" + ticketId;
}

</script>

</body>
</html>
